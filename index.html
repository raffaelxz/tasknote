<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskNote Finance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --primary:#c0ff8c;--primary-dark:#a8e67a;--primary-glow:rgba(192,255,140,0.18);
            --success:#10ac84;--warning:#f39c12;--danger:#f4212e;--purple:#9b59b6;
            --bg:#080808;--surface:#111111;--card:#161616;--card2:#1c1c1c;
            --text:#ffffff;--text2:#a0a0a0;--text3:#555555;
            --border:#232323;--border2:#2e2e2e;
            --r-pill:100px;--r-card:22px;--r-sm:14px;
            --t:all 0.2s ease;
        }
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-weight:400;line-height:1.5;-webkit-font-smoothing:antialiased}
        .app-container{max-width:600px;margin:0 auto;background:var(--bg);min-height:100vh;position:relative}

        /* ── HEADER ── */
        .app-header{position:sticky;top:0;background:rgba(8,8,8,0.92);backdrop-filter:blur(16px);padding:10px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);z-index:100}
        .logo-area{display:flex;align-items:center;gap:10px}
        .logo-circle{background:var(--primary);width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
        .logo-circle i{color:#000}
        .logo-text{display:flex;flex-direction:column;line-height:1.2}
        .logo-text span:first-child{font-size:1.05rem;font-weight:800;letter-spacing:-0.4px;background:linear-gradient(130deg,var(--primary),#80e040);-webkit-background-clip:text;background-clip:text;color:transparent}
        .logo-text span:last-child{font-size:0.6rem;color:var(--text3);font-weight:500;letter-spacing:0.5px;text-transform:uppercase}
        .header-right{display:flex;align-items:center;gap:6px}
        .header-badge{background:var(--primary-glow);border:1px solid rgba(192,255,140,0.2);color:var(--primary);font-size:0.65rem;font-weight:600;padding:4px 10px;border-radius:var(--r-pill);letter-spacing:0.3px}
        .menu-dots{background:none;border:none;color:var(--text2);font-size:1.1rem;cursor:pointer;padding:8px;border-radius:50%;transition:var(--t)}
        .menu-dots:hover{background:var(--surface);color:var(--text)}

        /* ── DROPDOWN ── */
        .dropdown-menu{position:fixed;top:60px;right:16px;background:var(--card);border-radius:18px;padding:6px;min-width:190px;box-shadow:0 16px 48px rgba(0,0,0,0.6);border:1px solid var(--border2);z-index:200;display:none}
        .dropdown-menu.show{display:block;animation:fadeDown 0.18s ease}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .dropdown-item{padding:10px 14px;display:flex;align-items:center;gap:10px;color:var(--text2);background:none;border:none;width:100%;text-align:left;cursor:pointer;font-size:0.82rem;font-weight:500;border-radius:12px;transition:var(--t)}
        .dropdown-item:hover{background:var(--surface);color:var(--text)}
        .dropdown-item.danger{color:#f4212e}
        .dropdown-item.danger:hover{background:rgba(244,33,46,0.08)}
        .dropdown-divider{height:1px;background:var(--border);margin:4px 0}

        /* ── PAGES ── */
        .page{display:none;padding:18px 16px 90px;animation:pgIn 0.25s ease}
        .page.active{display:block}
        @keyframes pgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* ── BOTTOM NAV ── */
        .bottom-nav{position:fixed;bottom:0;max-width:600px;width:100%;background:rgba(8,8,8,0.96);backdrop-filter:blur(24px);display:flex;justify-content:space-around;padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--border);z-index:100}
        .nav-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:8px 14px;border-radius:var(--r-pill);transition:var(--t);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:0.65rem;font-weight:600;letter-spacing:0.2px}
        .nav-btn i{font-size:1.2rem}
        .nav-btn.active{color:var(--primary);background:var(--primary-glow)}
        .nav-btn:active{transform:scale(0.94)}

        /* ── SECTION HEADER ── */
        .section-header{margin-bottom:18px}
        .section-header h2{font-size:1.3rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px}
        .section-header p{font-size:0.78rem;color:var(--text2)}

        /* ── CARDS ── */
        .card{background:var(--card);border-radius:var(--r-card);padding:20px;margin-bottom:14px;border:1px solid var(--border)}
        .card-label{font-size:0.72rem;font-weight:600;letter-spacing:0.4px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .card-label i{font-size:0.8rem}

        /* ── INCOME INPUT ── */
        .income-card{background:linear-gradient(145deg,#141a10,#111111);border:1px solid rgba(192,255,140,0.12);border-radius:var(--r-card);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
        .income-card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:radial-gradient(circle,rgba(192,255,140,0.07) 0%,transparent 70%);pointer-events:none}
        .income-label{font-size:0.72rem;font-weight:600;letter-spacing:0.4px;color:var(--primary);text-transform:uppercase;margin-bottom:14px}
        .input-wrapper{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:var(--r-pill);padding:14px 20px;display:flex;align-items:center;gap:10px;margin-bottom:14px;transition:var(--t)}
        .input-wrapper:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
        .input-wrapper .currency{font-weight:700;color:var(--primary);font-size:1rem;min-width:28px}
        .input-wrapper input{background:none;border:none;color:var(--text);font-size:1.05rem;font-weight:600;width:100%;outline:none;font-family:'Inter',sans-serif}
        .input-wrapper input::placeholder{color:var(--text3);font-weight:400}
        .btn-primary{background:var(--primary);color:#000;border:none;padding:14px;border-radius:var(--r-pill);font-weight:700;font-size:0.9rem;cursor:pointer;width:100%;transition:var(--t);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-primary:hover{background:var(--primary-dark)}
        .btn-primary:active{transform:scale(0.97)}

        /* ── QUICK STATS ROW ── */
        .quick-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
        .qs-card{background:var(--card);border-radius:18px;padding:14px 12px;border:1px solid var(--border);text-align:center}
        .qs-card .qs-icon{font-size:1.3rem;margin-bottom:6px}
        .qs-card .qs-label{font-size:0.6rem;font-weight:600;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:4px}
        .qs-card .qs-val{font-size:0.82rem;font-weight:700;color:var(--text)}

        /* ── ALLOCATION GRID ── */
        .alloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
        .alloc-card{background:var(--card);border-radius:20px;padding:16px;border:1px solid var(--border);transition:var(--t);position:relative;overflow:hidden}
        .alloc-card::after{content:'';position:absolute;bottom:-20px;right:-20px;width:70px;height:70px;border-radius:50%;opacity:0.06;pointer-events:none}
        .alloc-card.needs::after{background:#c0ff8c}
        .alloc-card.invest::after{background:#f39c12}
        .alloc-card.save::after{background:#9b59b6}
        .alloc-card.emergency::after{background:#ee5253}
        .alloc-card:active{transform:scale(0.98)}
        .alloc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .alloc-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem}
        .badge-pct{font-size:0.6rem;font-weight:700;padding:3px 8px;border-radius:var(--r-pill)}
        .alloc-name{font-size:0.68rem;font-weight:600;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:4px}
        .alloc-val{font-size:1.05rem;font-weight:800;letter-spacing:-0.4px;margin-bottom:10px}
        .prog-wrap{height:3px;background:rgba(255,255,255,0.07);border-radius:10px;overflow:hidden}
        .prog-bar{height:100%;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1);border-radius:10px}

        /* COLORS */
        .c-green .alloc-icon{background:rgba(192,255,140,0.1);color:#c0ff8c}
        .c-amber .alloc-icon{background:rgba(243,156,18,0.1);color:#f39c12}
        .c-purple .alloc-icon{background:rgba(155,89,182,0.1);color:#9b59b6}
        .c-red .alloc-icon{background:rgba(238,82,83,0.1);color:#ee5253}
        .c-green .badge-pct{background:rgba(192,255,140,0.1);color:#c0ff8c}
        .c-amber .badge-pct{background:rgba(243,156,18,0.1);color:#f39c12}
        .c-purple .badge-pct{background:rgba(155,89,182,0.1);color:#9b59b6}
        .c-red .badge-pct{background:rgba(238,82,83,0.1);color:#ee5253}
        .c-green .prog-bar{background:#c0ff8c}
        .c-amber .prog-bar{background:#f39c12}
        .c-purple .prog-bar{background:#9b59b6}
        .c-red .prog-bar{background:#ee5253}
        .c-green .alloc-val{color:#c0ff8c}
        .c-amber .alloc-val{color:#f39c12}
        .c-purple .alloc-val{color:#9b59b6}
        .c-red .alloc-val{color:#ee5253}

        /* ── METHOD BANNER ── */
        .method-banner{background:rgba(192,255,140,0.04);border:1px solid rgba(192,255,140,0.1);border-radius:18px;padding:16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
        .method-icon{width:36px;height:36px;background:var(--primary-glow);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;color:var(--primary)}
        .method-text h4{font-size:0.82rem;font-weight:700;color:var(--primary);margin-bottom:4px}
        .method-text p{font-size:0.72rem;color:var(--text2);line-height:1.6}

        /* ── CHART ── */
        .chart-container{background:var(--card);border-radius:var(--r-card);padding:18px;margin-bottom:14px;border:1px solid var(--border)}
        .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .chart-title{font-size:0.82rem;font-weight:700;color:var(--text)}
        .chart-sub{font-size:0.68rem;color:var(--text3)}

        /* ── STATS PAGE ── */
        .stat-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
        .stat-row:last-child{border-bottom:none}
        .stat-left{display:flex;align-items:center;gap:10px}
        .stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
        .stat-name{font-size:0.82rem;font-weight:500}
        .stat-right{text-align:right}
        .stat-amount{font-size:0.85rem;font-weight:700}
        .stat-pct{font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:var(--r-pill);margin-left:6px}

        /* ── TIPS ── */
        .tip-card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:10px;border:1px solid var(--border);display:flex;gap:14px;align-items:flex-start;transition:var(--t)}
        .tip-card:hover{border-color:var(--border2);background:var(--card2)}
        .tip-num{width:34px;height:34px;border-radius:10px;background:var(--primary-glow);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:800;color:var(--primary);flex-shrink:0}
        .tip-body h4{font-size:0.85rem;font-weight:700;margin-bottom:5px}
        .tip-body p{font-size:0.73rem;color:var(--text2);line-height:1.6}

        /* ── PROFILE ── */
        .profile-hero{background:linear-gradient(145deg,#141a10,#111111);border:1px solid rgba(192,255,140,0.1);border-radius:var(--r-card);padding:24px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
        .profile-hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;background:radial-gradient(circle,rgba(192,255,140,0.06) 0%,transparent 70%);pointer-events:none}
        .profile-avatar{width:72px;height:72px;background:var(--primary);border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.7rem;box-shadow:0 8px 24px rgba(192,255,140,0.2)}
        .profile-avatar i{color:#000}
        .profile-name{font-size:1.3rem;font-weight:800;letter-spacing:-0.4px;margin-bottom:4px}
        .profile-tag{font-size:0.72rem;color:var(--text2);background:var(--surface);display:inline-block;padding:4px 12px;border-radius:var(--r-pill);margin-top:6px;border:1px solid var(--border2)}
        .finance-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
        .finance-row:last-child{border-bottom:none}
        .fr-left{display:flex;align-items:center;gap:10px}
        .fr-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:0.85rem}
        .fr-label{font-size:0.8rem;font-weight:500;color:var(--text2)}
        .fr-val{font-size:0.88rem;font-weight:700}
        .activity-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .act-card{background:var(--surface);border-radius:14px;padding:12px 10px;text-align:center;border:1px solid var(--border)}
        .act-card .act-val{font-size:1rem;font-weight:800;letter-spacing:-0.3px;color:var(--primary);margin-bottom:2px}
        .act-card .act-label{font-size:0.6rem;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.3px}

        /* ── EMPTY STATE ── */
        .empty-state{text-align:center;padding:32px 20px}
        .empty-state .es-icon{font-size:2.5rem;margin-bottom:12px;opacity:0.3}
        .empty-state p{font-size:0.82rem;color:var(--text3);line-height:1.6}

        /* ── AUTH ── */
        .auth-wrap{position:fixed;inset:0;background:#080808;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
        .auth-box{background:#0e0e0e;border-radius:32px;padding:36px 26px;max-width:380px;width:100%;border:1px solid var(--border2)}
        .auth-logo{text-align:center;margin-bottom:28px}
        .auth-logo-circle{background:var(--primary);width:68px;height:68px;border-radius:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.8rem;box-shadow:0 12px 32px rgba(192,255,140,0.2)}
        .auth-logo-circle i{color:#000}
        .auth-logo h1{font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(130deg,var(--primary),#80e040);-webkit-background-clip:text;background-clip:text;color:transparent}
        .auth-logo p{font-size:0.75rem;color:var(--text3);margin-top:5px}
        .auth-input{width:100%;padding:13px 18px;background:#0a0a0a;border:1px solid var(--border2);border-radius:var(--r-pill);color:var(--text);font-size:0.88rem;margin-bottom:10px;outline:none;font-family:'Inter',sans-serif;transition:var(--t)}
        .auth-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
        .auth-input::placeholder{color:var(--text3)}
        .auth-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .auth-meta label{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--text2);font-size:0.75rem;font-weight:500}
        .auth-meta input[type="checkbox"]{accent-color:var(--primary)}
        .auth-forgot{color:var(--text3);font-size:0.72rem;cursor:pointer;transition:var(--t)}
        .auth-forgot:hover{color:var(--primary)}
        .auth-btn{background:var(--primary);color:#000;border:none;border-radius:var(--r-pill);padding:14px;width:100%;font-weight:800;font-size:0.9rem;cursor:pointer;font-family:'Inter',sans-serif;transition:var(--t);margin-bottom:16px}
        .auth-btn:hover{background:var(--primary-dark)}
        .auth-btn:active{transform:scale(0.97)}
        .auth-switch{text-align:center;color:var(--text3);font-size:0.78rem;cursor:pointer;transition:var(--t)}
        .auth-switch span{color:var(--primary);font-weight:600}
        .auth-error{color:#f4212e;font-size:0.73rem;text-align:center;margin-top:10px;min-height:18px}
        .auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0}
        .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
        .auth-divider span{font-size:0.68rem;color:var(--text3);font-weight:500}
        .demo-chips{display:flex;gap:8px;justify-content:center}
        .demo-chip{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-pill);padding:8px 14px;font-size:0.72rem;font-weight:600;color:var(--text2);cursor:pointer;transition:var(--t);display:flex;flex-direction:column;align-items:center;gap:2px}
        .demo-chip span:last-child{font-size:0.6rem;color:var(--text3);font-weight:400}
        .demo-chip:hover{border-color:var(--primary);color:var(--primary)}

        @media(max-width:420px){.alloc-grid{grid-template-columns:1fr 1fr}.quick-stats{grid-template-columns:1fr 1fr 1fr}}

        @keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .anim{animation:fadeInUp 0.4s ease both}
        .d1{animation-delay:0.05s}.d2{animation-delay:0.1s}.d3{animation-delay:0.15s}.d4{animation-delay:0.2s}.d5{animation-delay:0.25s}
    </style>
</head>
<body>
<div id="app"></div>
<script>
let users=[],currentUser=null,currentIncome=0,myChart=null,statsChart=null;
const fmt=(n)=>new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmtShort=(n)=>{if(n>=1e9)return'Rp '+(n/1e9).toFixed(1)+'M';if(n>=1e6)return'Rp '+(n/1e6).toFixed(1)+'jt';return fmt(n)};

function loadData(){
    const su=localStorage.getItem('tn_users');
    users=su?JSON.parse(su):[
        {id:1,username:'demo',password:'demo123',email:'demo@tasknote.com',lastIncome:7500000,createdAt:new Date().toISOString()},
        {id:2,username:'rizki',password:'123456',email:'rizki@tasknote.com',lastIncome:5000000,createdAt:new Date().toISOString()}
    ];
    if(!su)localStorage.setItem('tn_users',JSON.stringify(users));
    const sc=localStorage.getItem('tn_current');
    if(sc){currentUser=JSON.parse(sc);currentIncome=currentUser.lastIncome||0}
}
function saveUsers(){localStorage.setItem('tn_users',JSON.stringify(users))}
function saveCurrent(){localStorage.setItem('tn_current',JSON.stringify(currentUser))}

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+id)?.classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
    if(id==='stats')renderStats();
    if(id==='tips')renderTips();
    if(id==='profile')renderProfile();
}

function updateAlloc(type,amount,pct){
    const v=document.getElementById('val-'+type);if(v)v.innerText=fmt(amount);
    const b=document.getElementById('bar-'+type);if(b)setTimeout(()=>{b.style.width=pct+'%'},300);
}

function renderDonut(total){
    const ctx=document.getElementById('homeChart')?.getContext('2d');if(!ctx)return;
    if(myChart)myChart.destroy();
    myChart=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:['Kebutuhan 50%','Investasi 20%','Tabungan 20%','Dana Darurat 10%'],
            datasets:[{data:[50,20,20,10],backgroundColor:['#c0ff8c','#f39c12','#9b59b6','#ee5253'],borderWidth:0,hoverOffset:6}]
        },
        options:{cutout:'68%',plugins:{legend:{position:'bottom',labels:{color:'#888',font:{size:11},padding:12,usePointStyle:true,pointStyleWidth:8}}},responsive:true,animation:{animateRotate:true,duration:800}}
    });
}

function runCalc(income){
    const v=parseFloat(income)||0;
    if(v<=0){alert('Masukkan jumlah penghasilan yang valid!');return}
    currentIncome=v;
    if(currentUser){
        currentUser.lastIncome=v;saveCurrent();
        const i=users.findIndex(u=>u.id===currentUser.id);
        if(i!==-1){users[i].lastIncome=v;saveUsers()}
    }
    updateAlloc('needs',v*0.5,50);updateAlloc('invest',v*0.2,20);
    updateAlloc('save',v*0.2,20);updateAlloc('emergency',v*0.1,10);
    const cb=document.getElementById('chartBox');
    if(cb)cb.style.display='block';
    renderDonut(v);
    // update quick stats
    const qs=document.getElementById('quickStats');
    if(qs){
        qs.querySelector('#qs-invest').innerText=fmtShort(v*0.2);
        qs.querySelector('#qs-save').innerText=fmtShort(v*0.2);
        qs.querySelector('#qs-emer').innerText=fmtShort(v*0.1);
    }
}

function renderStats(){
    const ctx=document.getElementById('statsChart')?.getContext('2d');
    if(ctx&&currentIncome>0){
        if(statsChart)statsChart.destroy();
        statsChart=new Chart(ctx,{
            type:'bar',
            data:{
                labels:['Kebutuhan','Investasi','Tabungan','Darurat'],
                datasets:[{label:'Alokasi (IDR)',data:[currentIncome*.5,currentIncome*.2,currentIncome*.2,currentIncome*.1],
                    backgroundColor:['rgba(192,255,140,0.7)','rgba(243,156,18,0.7)','rgba(155,89,182,0.7)','rgba(238,82,83,0.7)'],
                    borderColor:['#c0ff8c','#f39c12','#9b59b6','#ee5253'],borderWidth:1.5,borderRadius:10,borderSkipped:false}]
            },
            options:{responsive:true,plugins:{legend:{display:false}},
                scales:{y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',callback:(v)=>'Rp '+v.toLocaleString('id-ID'),font:{size:10}}},
                        x:{grid:{display:false},ticks:{color:'#888',font:{size:11}}}}}
        });
    }
    const pl=document.getElementById('statsDetail');
    if(!pl)return;
    if(currentIncome<=0){pl.innerHTML='<div class="empty-state"><div class="es-icon"><i class="fas fa-chart-pie"></i></div><p>Masukkan penghasilan di beranda<br>untuk melihat statistik alokasi.</p></div>';return}
    const items=[
        {name:'Kebutuhan',dot:'#c0ff8c',val:currentIncome*.5,pct:'50%',bg:'rgba(192,255,140,0.1)',col:'#c0ff8c'},
        {name:'Investasi',dot:'#f39c12',val:currentIncome*.2,pct:'20%',bg:'rgba(243,156,18,0.1)',col:'#f39c12'},
        {name:'Tabungan',dot:'#9b59b6',val:currentIncome*.2,pct:'20%',bg:'rgba(155,89,182,0.1)',col:'#9b59b6'},
        {name:'Dana Darurat',dot:'#ee5253',val:currentIncome*.1,pct:'10%',bg:'rgba(238,82,83,0.1)',col:'#ee5253'},
    ];
    pl.innerHTML=items.map(it=>`
        <div class="stat-row">
            <div class="stat-left"><div class="stat-dot" style="background:${it.dot}"></div><span class="stat-name">${it.name}</span></div>
            <div class="stat-right" style="display:flex;align-items:center;gap:6px">
                <span class="stat-amount">${fmt(it.val)}</span>
                <span class="stat-pct" style="background:${it.bg};color:${it.col}">${it.pct}</span>
            </div>
        </div>`).join('');
    const total=document.getElementById('statsTotal');
    if(total)total.innerText=fmt(currentIncome);
}

function showAuth(){
    document.getElementById('app').innerHTML=`
    <div class="auth-wrap">
        <div class="auth-box">
            <div class="auth-logo">
                <div class="auth-logo-circle"><i class="fas fa-piggy-bank"></i></div>
                <h1>TaskNote Finance</h1>
                <p>Kelola keuanganmu lebih cerdas</p>
            </div>
            <input type="text" id="au" class="auth-input" placeholder="Username" autocomplete="off">
            <input type="password" id="ap" class="auth-input" placeholder="Password">
            <div class="auth-meta">
                <label><input type="checkbox" id="rem"> Ingat saya</label>
                <span class="auth-forgot" id="forgot">Lupa password?</span>
            </div>
            <button class="auth-btn" id="authBtn">Masuk</button>
            <div class="auth-switch" id="authSwitch">Belum punya akun? <span>Daftar sekarang</span></div>
            <div class="auth-divider"><span>atau coba akun demo</span></div>
            <div class="demo-chips">
                <div class="demo-chip" id="demo1"><span>demo</span><span>demo123</span></div>
                <div class="demo-chip" id="demo2"><span>rizki</span><span>123456</span></div>
            </div>
            <div class="auth-error" id="authErr"></div>
        </div>
    </div>`;

    let isLogin=true;
    const ab=document.getElementById('authBtn'),as=document.getElementById('authSwitch'),ae=document.getElementById('authErr');

    document.getElementById('demo1').onclick=()=>{document.getElementById('au').value='demo';document.getElementById('ap').value='demo123'};
    document.getElementById('demo2').onclick=()=>{document.getElementById('au').value='rizki';document.getElementById('ap').value='123456'};
    document.getElementById('forgot').onclick=()=>alert('Demo:\nUsername: demo | Password: demo123');

    as.onclick=()=>{
        isLogin=!isLogin;
        ab.textContent=isLogin?'Masuk':'Daftar Akun';
        as.innerHTML=isLogin?'Belum punya akun? <span>Daftar sekarang</span>':'Sudah punya akun? <span>Masuk</span>';
        ae.textContent='';
    };

    const doAuth=()=>{
        const u=document.getElementById('au').value.trim(),p=document.getElementById('ap').value.trim();
        if(!u||!p){ae.textContent='Username dan password harus diisi!';return}
        if(isLogin){
            const user=users.find(x=>x.username===u&&x.password===p);
            if(user){currentUser=user;currentIncome=user.lastIncome||0;if(document.getElementById('rem').checked)saveCurrent();renderApp()}
            else ae.textContent='Username atau password salah!';
        } else {
            if(users.find(x=>x.username===u)){ae.textContent='Username sudah terdaftar!';return}
            if(p.length<3){ae.textContent='Password minimal 3 karakter!';return}
            const nu={id:Date.now(),username:u,password:p,email:u+'@tasknote.com',lastIncome:0,createdAt:new Date().toISOString()};
            users.push(nu);saveUsers();currentUser=nu;currentIncome=0;saveCurrent();renderApp();
        }
    };

    ab.onclick=doAuth;
    [document.getElementById('au'),document.getElementById('ap')].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doAuth()}));
}

loadData();
const tmp=sessionStorage.getItem('tmp_user');
if(tmp&&!currentUser){currentUser=JSON.parse(tmp);currentIncome=currentUser.lastIncome||0;renderApp()}
else if(currentUser)renderApp();
else showAuth();
</script>
