<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskNote - Manajemen Tugas Mahasiswa</title>
    <meta name="theme-color" content="#b7e4c7">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-green: #b7e4c7;
            --dark-accent: #2d3436;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--dark-accent);
            min-height: 100vh;
        }

        h1, h2, h3 { font-weight: 700; color: var(--dark-accent); }
        .btn-primary { background-color: #74c69d; border: none; color: white; }
        .btn-primary:hover { background-color: #52b788; }
        
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .task-item { transition: 0.3s; border-left: 5px solid var(--primary-green); margin-bottom: 10px; }
        .task-done { text-decoration: line-through; opacity: 0.6; border-left-color: #ced4da; }
        
        #auth-section, #app-section { display: none; }
        .auth-container { max-width: 400px; margin: 80px auto; }
    </style>
</head>
<body>

<div id="app" class="container py-4">
    <div id="auth-section">
        <div class="auth-container card p-4">
            <h2 class="text-center mb-4" id="auth-title">Login TaskNote</h2>
            
            <form id="auth-form">
                <div id="register-fields" class="d-none">
                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="reg-name" class="form-control" placeholder="Masukkan nama">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="auth-email" class="form-control" required placeholder="mhs@kampus.id">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="auth-pass" class="form-control" required minlength="6" placeholder="Min. 6 karakter">
                </div>
                <div class="mb-3 form-check" id="remember-me-container">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">Ingat Saya</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3" id="btn-auth-submit">Masuk</button>
                <p class="text-center small">
                    <span id="auth-toggle-text">Belum punya akun?</span> 
                    <a href="#" id="auth-toggle-link" onclick="toggleAuthMode()">Daftar di sini</a>
                </p>
            </form>
        </div>
    </div>

    <div id="app-section">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="mb-0">TaskNote</h1>
                <p class="text-muted">Halo, <span id="user-display-name"></span>! 👋</p>
            </div>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Keluar
            </button>
        </div>

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card p-4">
                    <h3>Tambah Tugas</h3>
                    <form id="todo-form">
                        <input type="text" id="task-input" class="form-control mb-3" placeholder="Contoh: Kerjakan Tugas Alpro..." required>
                        <button type="submit" class="btn btn-primary w-100">Simpan Tugas</button>
                    </form>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card p-4">
                    <h3>Daftar Tugas</h3>
                    <div id="task-list" class="mt-3">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    // --- KONFIGURASI STATE ---
    let isRegisterMode = false;
    let currentUser = null;

    // --- SISTEM AUTENTIKASI ---
    function toggleAuthMode() {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? 'Daftar Akun' : 'Login TaskNote';
        document.getElementById('register-fields').classList.toggle('d-none', !isRegisterMode);
        document.getElementById('remember-me-container').classList.toggle('d-none', isRegisterMode);
        document.getElementById('btn-auth-submit').innerText = isRegisterMode ? 'Buat Akun' : 'Masuk';
        document.getElementById('auth-toggle-text').innerText = isRegisterMode ? 'Sudah punya akun?' : 'Belum punya akun?';
    }

    document.getElementById('auth-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const users = JSON.parse(localStorage.getItem('tn_users') || '[]');

        if (isRegisterMode) {
            const name = document.getElementById('reg-name').value;
            if (users.find(u => u.email === email)) return alert('Email sudah terdaftar!');
            
            // Hash password sederhana
            const hashedPass = CryptoJS.SHA256(pass).toString();
            users.push({ name, email, pass: hashedPass });
            localStorage.setItem('tn_users', JSON.stringify(users));
            alert('Registrasi berhasil! Silakan login.');
            toggleAuthMode();
        } else {
            const hashedPass = CryptoJS.SHA256(pass).toString();
            const user = users.find(u => u.email === email && u.pass === hashedPass);
            
            if (user) {
                const sessionData = { name: user.name, email: user.email };
                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('tn_session', JSON.stringify(sessionData));
                } else {
                    sessionStorage.setItem('tn_session', JSON.stringify(sessionData));
                }
                initApp(sessionData);
            } else {
                alert('Email atau password salah!');
            }
        }
    });

    function logout() {
        localStorage.removeItem('tn_session');
        sessionStorage.removeItem('tn_session');
        location.reload();
    }

    // --- MANAJEMEN TUGAS ---
    let tasks = [];

    function initApp(user) {
        currentUser = user;
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('app-section').style.display = 'block';
        document.getElementById('user-display-name').innerText = user.name;
        
        // Load tasks milik user spesifik
        tasks = JSON.parse(localStorage.getItem(`tasks_${user.email}`) || '[]');
        renderTasks();
    }

    document.getElementById('todo-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const text = document.getElementById('task-input').value;
        tasks.push({ id: Date.now(), text, completed: false });
        saveTasks();
        renderTasks();
        e.target.reset();
    });

    function saveTasks() {
        localStorage.setItem(`tasks_${currentUser.email}`, JSON.stringify(tasks));
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        saveTasks();
        renderTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = tasks.length === 0 ? '<p class="text-center text-muted">Belum ada tugas.</p>' : '';
        
        tasks.sort((a,b) => a.completed - b.completed).forEach(task => {
            const div = document.createElement('div');
            div.className = `card p-3 task-item ${task.completed ? 'task-done' : ''} d-flex flex-row align-items-center justify-content-between`;
            div.innerHTML = `
                <div class="d-flex align-items-center gap-3">
                    <input type="checkbox" ${task.completed ? 'checked' : ''} onclick="toggleTask(${task.id})" class="form-check-input">
                    <span>${task.text}</span>
                </div>
                <button onclick="deleteTask(${task.id})" class="btn btn-sm text-danger"><i class="bi bi-trash"></i></button>
            `;
            list.appendChild(div);
        });
    }

    // --- CEK SESSION SAAT LOAD ---
    window.onload = () => {
        const savedSession = localStorage.getItem('tn_session') || sessionStorage.getItem('tn_session');
        if (savedSession) {
            initApp(JSON.parse(savedSession));
        } else {
            document.getElementById('auth-section').style.display = 'block';
        }
    };

    // --- SERVICE WORKER REGISTRATION (PWA) ---
    if ('serviceWorker' in navigator) {
        const swCode = `
            const cacheName = 'tasknote-v1';
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(['./'])));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl);
    }
</script>
</body>
</html>
